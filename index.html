<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Активация — Variant 2</title>
    <link rel="stylesheet" href="tear-strip/tear-strip.css?v=1" />
    <link rel="stylesheet" href="variant-envelope/variant-envelope.css?v=15" />
    <link rel="stylesheet" href="activation/activation.css?v=11" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        overflow-x: clip;
        background: #e7fcd9;
        font-family: system-ui, -apple-system, sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
        height: 100svh;
      }

      @media (min-width: 768px) {
        body {
          display: grid;
          place-items: center;
          overflow: auto;
          background: #f5f5f5;
        }

        #app {
          width: auto;
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script src="tear-strip/tear-strip.js?v=1"></script>
    <script src="variant-envelope/variant-envelope.js?v=11"></script>
    <script src="activation/activation.js?v=10"></script>
    <script>
      ActivationScreen.create(document.getElementById('app'), {
        envelope: {
          width: 374,
          height: 369,
          tearBottom: 179,
          tearWidth: 334,
          insideSrc: 'pink_inside.png',
          cardSrc: 'card.png',
          topSrc: 'envelope_top.png',
          bottomSrc: 'envelope_bottom.png',
          stripOptions: {
            animationMode: 'scatter',
            color: '#19CA41',
          },
        },
      });
    </script>
  </body>
</html>
